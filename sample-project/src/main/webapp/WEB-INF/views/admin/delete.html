<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Admin Page</title>

<style>
* {
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
		sans-serif;
	background: #f5f7fb;
	margin: 0;
	padding: 40px;
	display: flex;
	justify-content: center;
}

.container {
	width: 100%;
	max-width: 500px;
	background: white;
	padding: 35px;
	border-radius: 12px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

h1 {
	text-align: center;
	margin-bottom: 10px;
	color: #222;
}

h2 {
	text-align: center;
	margin-top: 0;
	font-size: 18px;
	color: #666;
	border-bottom: 1px solid #eee;
	padding-bottom: 10px;
}

label {
	display: block;
	margin-top: 15px;
	font-weight: 600;
	font-size: 14px;
	color: #444;
}

input {
	width: 100%;
	padding: 10px;
	margin-top: 5px;
	border-radius: 6px;
	border: 1px solid #dcdfe6;
	font-size: 14px;
	transition: border 0.2s;
}

input:focus {
	outline: none;
	border-color: #4c7fff;
}

button {
	width: 100%;
	margin-top: 25px;
	padding: 12px;
	font-size: 15px;
	font-weight: 600;
	border: none;
	border-radius: 6px;
	background: #e74c3c;
	color: white;
	cursor: pointer;
	transition: background 0.2s;
}

button:hover {
	background: #c0392b;
}

#result {
	margin-top: 20px;
	padding: 12px;
	border-radius: 6px;
	display: none;
	font-size: 14px;
}

.ok {
	background: #eaf7ee;
	color: #1e7e34;
	border: 1px solid #c3e6cb;
}

.err {
	background: #fdecea;
	color: #c0392b;
	border: 1px solid #f5c6cb;
}

small {
	color: #888;
	font-size: 12px;
}
</style>

</head>

<body>

	<div class="container">

		<h1>Admin Page</h1>
		<h2>Delete card transaction data</h2>

		<form id="deleteForm">
			<input type="hidden" name="action" value="delete" /> <label>
				기준 시점 <small>예) 202401</small>
			</label> <input type="text" name="basYh" placeholder="202401" required /> <label>
				고객 번호 </label> <input type="text" name="seq" placeholder="123" required />

			<button type="submit">삭제</button>
		</form>
		<div id="result"></div>
	</div>

	<script>

	document.getElementById('deleteForm').addEventListener('submit', async function (e) {
	
		e.preventDefault();
		
		const params = new URLSearchParams(new FormData(this));
		
		const res = await fetch('/sample-project/admin/card-transaction', {
		  method: 'POST',
		  headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		  body: params.toString()
		});
		
		const json = await res.json();
		
		const resultDiv = document.getElementById('result');
		resultDiv.style.display = 'block';
		
		if (json.result === 'ok') {
		
		  resultDiv.className = 'ok';
		  resultDiv.textContent = json.rows > 0
		      ? '삭제 완료!'
		      : '해당 고객번호가 존재하지 않습니다.';
		
		  this.reset();
		
		} else {
		  resultDiv.className = 'err';
		  resultDiv.textContent = '오류: ' + json.message;
		}
	});

	</script>

</body>
</html>
