<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Admin Page</title>
<style>
* {
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
		sans-serif;
	background: #f5f7fb;
	margin: 0;
	padding: 40px;
	display: flex;
	justify-content: center;
}

.container {
	width: 100%;
	max-width: 500px;
	background: white;
	padding: 35px;
	border-radius: 12px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

h1 {
	text-align: center;
	margin-bottom: 10px;
	color: #222;
}

h2 {
	text-align: center;
	margin-top: 0;
	font-size: 18px;
	color: #666;
	border-bottom: 1px solid #eee;
	padding-bottom: 10px;
}

label {
	display: block;
	margin-top: 15px;
	font-weight: 600;
	font-size: 14px;
	color: #444;
}

input, select {
	width: 100%;
	padding: 10px;
	margin-top: 5px;
	border-radius: 6px;
	border: 1px solid #dcdfe6;
	font-size: 14px;
	transition: border 0.2s;
}

input:focus, select:focus {
	outline: none;
	border-color: #4c7fff;
}

button {
	width: 100%;
	margin-top: 25px;
	padding: 12px;
	font-size: 15px;
	font-weight: 600;
	border: none;
	border-radius: 6px;
	background: #4c7fff;
	color: white;
	cursor: pointer;
	transition: background 0.2s;
}

button:hover {
	background: #3a63d8;
}

button.delete {
	background: #e74c3c;
}

button.delete:hover {
	background: #c0392b;
}

#result {
	margin-top: 20px;
	padding: 12px;
	border-radius: 6px;
	display: none;
	font-size: 14px;
}

.ok {
	background: #eaf7ee;
	color: #1e7e34;
	border: 1px solid #c3e6cb;
}

.err {
	background: #fdecea;
	color: #c0392b;
	border: 1px solid #f5c6cb;
}

small {
	color: #888;
	font-size: 12px;
}
</style>
</head>
<body>
	<div class="container">
		<h1>Admin Page</h1>
		<h2>Insert card transaction data</h2>

		<form id="insertForm">
			<input type="hidden" name="action" value="insert" /> <label>기준 시점
			</label> <input type="text" name="basYh" placeholder="2026Q1" required /> <label>고객 번호
			</label> <input type="text" name="seq" placeholder="123" required /> <label>라이프
				스테이지</label> <select name="lifeStage">
				<option value="NEW_JOB">NEW_JOB</option>
				<option value="CHILD_BABY">CHILD_BABY</option>
				<option value="CHILD_TEEN">CHILD_TEEN</option>
				<option value="CHILD_UNI">CHILD_UNI</option>
				<option value="GOLLIFE">GOLLIFE</option>
				<option value="RETIR">RETIR</option>
				<option value="SECLIFE">SECLIFE</option>
				<option value="TEEN">TEEN</option>
				<option value="UNI">UNI</option>
			</select> <label>총 이용금액</label> <input type="number" name="totUseAm"
				placeholder="0" />

			<button type="submit">등록</button>
		</form>

		<div id="result"></div>

		<script>
	    document.getElementById('insertForm').addEventListener('submit', async function (e) {
	      e.preventDefault();
	
	      const formData = new FormData(this);
	      const params = new URLSearchParams(formData);
	
	      const res = await fetch('/sample-project/admin/card-transaction', {
	        method: 'POST',
	        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
	        body: params.toString()
	      });
	
	      const json = await res.json();
	      const resultDiv = document.getElementById('result');
	      resultDiv.style.display = 'block';
	
	      if (json.result === 'ok') {
	        resultDiv.className = 'ok';
	        resultDiv.textContent = '등록 완료! (rows: ' + json.rows + ')';
	        this.reset();
	      } else {
	        resultDiv.className = 'err';
	        resultDiv.textContent = '오류: ' + json.message;
	      }
	    });
	  </script>
	</div>
</body>
</html>
