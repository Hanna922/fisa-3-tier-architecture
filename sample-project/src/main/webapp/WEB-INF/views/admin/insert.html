<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Admin Page</title>
<style>
* {
	box-sizing: border-box;
}

body {
	font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
	background: #f5f7fb;
	margin: 0;
	padding: 40px;
	display: flex;
	justify-content: center;
}

.wrapper {
	width: 100%;
	max-width: 500px;
	display: flex;
	flex-direction: column;
	gap: 12px;
}

.top-bar {
	display: flex;
	justify-content: flex-end;
	gap: 8px;
}

.top-bar button {
	padding: 9px 18px;
	font-size: 13px;
	font-weight: 600;
	color: #3c4043;
	background-color: #ffffff;
	border: 1px solid #dadce0;
	border-radius: 12px;
	cursor: pointer;
	transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.top-bar button:hover {
	background-color: #e8f0fe;
	border-color: #1a73e8;
	color: #1967d2;
	transform: translateY(-2px);
	box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
}

.container {
	width: 100%;
	background: white;
	padding: 35px;
	border-radius: 12px;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
}

h1 {
	text-align: center;
	margin-bottom: 24px;
	color: #222;
}

/* 탭 */
.tabs {
	display: flex;
	border-bottom: 2px solid #eee;
	margin-bottom: 28px;
}

.tab-btn {
	flex: 1;
	padding: 12px;
	font-size: 15px;
	font-weight: 600;
	border: none;
	background: none;
	cursor: pointer;
	color: #999;
	border-bottom: 3px solid transparent;
	margin-bottom: -2px;
	transition: color 0.2s, border-color 0.2s;
}

.tab-btn.active {
	color: #4c7fff;
	border-bottom-color: #4c7fff;
}

.tab-btn:hover:not(.active) {
	color: #555;
}

/* 폼 패널 */
.tab-panel {
	display: none;
	animation: fadeIn 0.2s ease;
}

.tab-panel.active {
	display: block;
}

@keyframes fadeIn {
	from { opacity: 0; transform: translateY(6px); }
	to   { opacity: 1; transform: translateY(0); }
}

label {
	display: block;
	margin-top: 15px;
	font-weight: 600;
	font-size: 14px;
	color: #444;
}

input, select {
	width: 100%;
	padding: 10px;
	margin-top: 5px;
	border-radius: 6px;
	border: 1px solid #dcdfe6;
	font-size: 14px;
	transition: border 0.2s;
}

input:focus, select:focus {
	outline: none;
	border-color: #4c7fff;
}

.submit-btn {
	width: 100%;
	margin-top: 25px;
	padding: 12px;
	font-size: 15px;
	font-weight: 600;
	border: none;
	border-radius: 6px;
	color: white;
	cursor: pointer;
	transition: background 0.2s;
}

.submit-btn.insert {
	background: #4c7fff;
}

.submit-btn.insert:hover {
	background: #3a63d8;
}

.submit-btn.delete {
	background: #e74c3c;
}

.submit-btn.delete:hover {
	background: #c0392b;
}

.result-box {
	margin-top: 20px;
	padding: 12px;
	border-radius: 6px;
	display: none;
	font-size: 14px;
}

.ok {
	background: #eaf7ee;
	color: #1e7e34;
	border: 1px solid #c3e6cb;
}

.err {
	background: #fdecea;
	color: #c0392b;
	border: 1px solid #f5c6cb;
}

small {
	color: #888;
	font-size: 12px;
}
</style>
</head>
<body>
<div class="wrapper">
<div class="top-bar">
	<button onclick="location.href='/sample-project/life-stages'">홈</button>
	<button onclick="location.href='/sample-project/logout'">로그아웃</button>
</div>
<div class="container">
	<h1>Admin Page</h1>

	<div class="tabs">
		<button class="tab-btn active" onclick="switchTab('insert')">Insert</button>
		<button class="tab-btn" onclick="switchTab('delete')">Delete</button>
	</div>

	<!-- Insert 패널 -->
	<div id="panel-insert" class="tab-panel active">
		<form id="insertForm">
			<input type="hidden" name="action" value="insert" />

			<label>기준 시점</label>
			<input type="text" name="basYh" placeholder="2026Q1" required />

			<label>고객 번호</label>
			<input type="text" name="seq" placeholder="123" required />

			<label>라이프 스테이지</label>
			<select name="lifeStage">
				<option value="NEW_JOB">NEW_JOB</option>
				<option value="CHILD_BABY">CHILD_BABY</option>
				<option value="CHILD_TEEN">CHILD_TEEN</option>
				<option value="CHILD_UNI">CHILD_UNI</option>
				<option value="GOLLIFE">GOLLIFE</option>
				<option value="RETIR">RETIR</option>
				<option value="SECLIFE">SECLIFE</option>
				<option value="TEEN">TEEN</option>
				<option value="UNI">UNI</option>
			</select>

			<label>총 이용금액</label>
			<input type="number" name="totUseAm" placeholder="0" />

			<button type="submit" class="submit-btn insert">등록</button>
		</form>
		<div id="insert-result" class="result-box"></div>
	</div>

	<!-- Delete 패널 -->
	<div id="panel-delete" class="tab-panel">
		<form id="deleteForm">
			<input type="hidden" name="action" value="delete" />

			<label>기준 시점 <small>예) 202401</small></label>
			<input type="text" name="basYh" placeholder="202401" required />

			<label>고객 번호</label>
			<input type="text" name="seq" placeholder="123" required />

			<button type="submit" class="submit-btn delete">삭제</button>
		</form>
		<div id="delete-result" class="result-box"></div>
	</div>
</div>
</div>

<script>
function switchTab(tab) {
	document.querySelectorAll('.tab-btn').forEach((btn, i) => {
		btn.classList.toggle('active', (i === 0 && tab === 'insert') || (i === 1 && tab === 'delete'));
	});
	document.getElementById('panel-insert').classList.toggle('active', tab === 'insert');
	document.getElementById('panel-delete').classList.toggle('active', tab === 'delete');
}

async function postForm(formEl, resultId) {
	const params = new URLSearchParams(new FormData(formEl));
	const res = await fetch('/sample-project/admin/card-transaction', {
		method: 'POST',
		headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
		body: params.toString()
	});
	const json = await res.json();
	const resultDiv = document.getElementById(resultId);
	resultDiv.style.display = 'block';

	if (json.result === 'ok') {
		resultDiv.className = 'result-box ok';
		resultDiv.textContent = resultId === 'insert-result'
			? '등록 완료! (rows: ' + json.rows + ')'
			: (json.rows > 0 ? '삭제 완료!' : '해당 고객번호가 존재하지 않습니다.');
		formEl.reset();
	} else {
		resultDiv.className = 'result-box err';
		resultDiv.textContent = '오류: ' + json.message;
	}
}

document.getElementById('insertForm').addEventListener('submit', function(e) {
	e.preventDefault();
	postForm(this, 'insert-result');
});

document.getElementById('deleteForm').addEventListener('submit', function(e) {
	e.preventDefault();
	postForm(this, 'delete-result');
});
</script>
</body>
</html>
